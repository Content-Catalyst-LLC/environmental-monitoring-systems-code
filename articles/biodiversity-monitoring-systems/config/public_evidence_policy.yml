public_evidence_policy:
  version: "1.0.0"
  required_public_fields:
    - monitoring_period
    - target_taxa
    - methods
    - effort
    - detectability_limit
    - taxonomic_coverage
    - spatial_representativeness
    - indicator_definition
    - habitat_context
    - uncertainty_statement
    - known_blind_spots
    - governance_owner
  public_claim_rule: "Public biodiversity claims must be traceable to observations, effort, detectability, indicators, uncertainty, and governance review."
