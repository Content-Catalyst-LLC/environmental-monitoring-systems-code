telemetry_contract:
  required_fields:
    - sensor_id
    - domain
    - raw_value
    - battery_voltage
    - signal_quality
    - observed_at
  quality_thresholds:
    minimum_battery_voltage: 3.3
    minimum_signal_quality: 0.8
  freshness:
    expected_interval_minutes: 5
    maximum_delay_minutes: 30
